<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Church of God — Global Missions & Schools</title>
<script src="/vendor/d3.v7.min.js"></script>
<script src="/vendor/topojson-client.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #020408;
    --accent: #00e5ff;
    --accent-glow: #00e5ff66;
    --sea: #030610;
    --land: rgba(0,40,80,0.25);
    --land-stroke: #00b8ff;
    --panel-bg: rgba(2, 8, 20, 0.95);
    --text: #f0e8d0;
    --text-muted: #8090a0;
    --mission-color: #f0c040;
    --school-color: #9b59b6;
    --mission-glow: #f0c04066;
    --school-glow: #f0c04066;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    touch-action: none;
    cursor: default;
  }
  #scene {
    width: 2400px; height: 1350px;
    background: var(--bg);
    position: absolute;
    top: 50%; left: 50%;
    transform-origin: center center;
    -webkit-user-select: none;
    user-select: none;
  }


  #map-container { position: relative; width: 100%; height: 100%; z-index: 1; transform: translateZ(0); }
  #map-container svg { display: block; width: 100%; height: 100%; }
  #map-container::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 55%, rgba(0,2,8,0.35) 100%);
  }

  .country { stroke: rgba(0,200,255,0.7); stroke-width: 0.6; }
  .coastline-glow { fill: none; stroke: rgba(0,220,255,0.5); stroke-width: 2; pointer-events: none; }
  .coastline-glow-bright { fill: none; stroke: rgba(0,200,255,0.15); stroke-width: 4; pointer-events: none; }
  @keyframes coastline-pulse { 0%, 100% { stroke-opacity: 0.6; } 50% { stroke-opacity: 0.85; } }
  .country-africa { fill: rgba(0,30,75,0.75); }
  .country-europe { fill: rgba(0,28,70,0.75); }
  .country-asia { fill: rgba(0,25,65,0.75); }
  .country-namerica { fill: rgba(0,32,78,0.75); }
  .country-samerica { fill: rgba(0,28,68,0.75); }
  .country-oceania { fill: rgba(0,27,70,0.75); }
  .country-other { fill: rgba(0,30,75,0.75); }

  .graticule { fill: none; stroke: rgba(0,180,255,0.18); stroke-width: 0.8; stroke-dasharray: 6 10; }
  .arc-line { fill: none; stroke: rgba(0,229,255,0.10); stroke-width: 0.8; stroke-dasharray: 6 4; pointer-events: none; }
  .ocean-wave { fill: none; stroke: rgba(0,80,160,0.04); stroke-width: 1; }
  .ocean-wave-group { animation: wave-drift 30s linear infinite; will-change: transform; }
  @keyframes wave-drift { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-200px,0,0); } }

  .region-label { font-size: 14px; fill: rgba(0,200,255,0.25); letter-spacing: 6px; text-transform: uppercase; text-anchor: middle; pointer-events: none; font-weight: 600; }

  /* ── HUD Overlay ───────────────────────────────── */

  /* ── Pulse Rings ───────────────────────────────── */
  .pulse-ring { fill: none; pointer-events: none; }

  /* ── Marker Flare (data transmission arrival) ──── */
  .marker-flare .marker-halo { opacity: 0.9 !important; transform: scale(2); transition: all 0.3s ease-out; }
  .marker-bounce { animation: marker-bounce 0.4s ease; }
  @keyframes marker-bounce { 0% { transform: scale(1); } 40% { transform: scale(1.2); } 100% { transform: scale(1); } }

  /* ── Touch Ripple ──────────────────────────────── */
  .touch-ripple { fill: none; pointer-events: none; }
  .touch-connection { fill: none; stroke-width: 1.5; pointer-events: none; }

  .marker-group { cursor: pointer; }
  .marker-halo { opacity: 0.4; }
  .marker-dot { transition: r 0.2s; }
  .marker-group:hover .marker-dot, .marker-group.active .marker-dot { r: 24; }
  .marker-group:hover .marker-halo { opacity: 0.7; }
  .marker-label { font-size: 22px; fill: #f0d080; text-anchor: middle; pointer-events: none; opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 12px rgba(0,0,0,0.9), 0 0 20px rgba(240,192,64,0.3); font-weight: 600; }
  .marker-group:hover .marker-label { opacity: 1; }

  .marker-breathe { animation: breathe 4s ease-in-out infinite; will-change: opacity; }
  @keyframes breathe { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.55; } }

  /* ── HQ Star ──────────────────────────────────── */
  .hq-star .star-glow { animation: star-pulse 4s ease-in-out infinite; will-change: opacity, transform; }
  @keyframes star-pulse { 0%, 100% { opacity: 0.4; transform: scale3d(1,1,1); } 50% { opacity: 0.7; transform: scale3d(1.15,1.15,1); } }
  .hq-star .star-shape { animation: star-rotate 60s linear infinite; will-change: transform; }
  @keyframes star-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* ── Light stream animation ──────────────────── */
  .light-particle { fill: none; stroke-width: 6; stroke-linecap: round; }
  .light-shadow { fill: none; stroke-width: 16; stroke-linecap: round; filter: url(#particle-blur); }


  /* ── Info Panel (popup near dot) ──────────────── */
  #info-panel {
    position: fixed;
    width: min(440px, 75vw); max-height: 85vh;
    background: var(--panel-bg); border: 1px solid rgba(0,180,255,0.25);
    border-radius: 18px; padding: 28px 26px;
    z-index: 100;
    overflow-y: auto; backdrop-filter: blur(20px);
    box-shadow: 0 12px 80px rgba(0,0,0,0.8), 0 0 30px rgba(0,180,255,0.08);
    opacity: 0; pointer-events: none;
    transform: scale(0.9);
    transition: opacity 0.35s cubic-bezier(0.16,1,0.3,1), transform 0.35s cubic-bezier(0.16,1,0.3,1);
  }
  #info-panel.open { opacity: 1; pointer-events: auto; transform: scale(1); }

  #panel-close {
    position: absolute; top: 18px; right: 22px;
    width: 40px; height: 40px; border: 1px solid #3a5a90; border-radius: 50%;
    background: transparent; color: var(--text-muted); font-size: 22px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  #panel-close:active { border-color: var(--accent); color: var(--accent); }

  .panel-type {
    display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; padding: 5px 12px; border-radius: 14px; margin-bottom: 10px;
  }
  .panel-type.mission { background: rgba(240,192,64,0.15); color: var(--mission-color); border: 1px solid rgba(240,192,64,0.3); }
  .panel-type.school  { background: rgba(155,89,182,0.15); color: var(--school-color); border: 1px solid rgba(155,89,182,0.3); }

  .panel-title { font-size: clamp(18px,2.5vw,26px); font-weight: 700; margin-bottom: 6px; line-height: 1.2; color: #f0c040; }
  .panel-location { font-size: 15px; color: var(--text-muted); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .panel-location svg { width: 15px; height: 15px; fill: var(--text-muted); }

  .panel-image { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; margin-bottom: 14px; background: #1a2340; display: flex; align-items: center; justify-content: center; position: relative; }
  .panel-image img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 1; }
  .panel-slide { position: relative; width: 100%; height: 100%; flex-shrink: 0; overflow: hidden; }
  .panel-slide .blur-bg { position: absolute; inset: -20px; background-size: cover; background-position: center; filter: blur(18px) brightness(0.5); z-index: 0; }
  .panel-image-placeholder {
    width: 100%; height: 100%; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
  }
  .panel-image-placeholder.mission-bg {
    background: linear-gradient(135deg, #0a1628 0%, #142040 30%, #1a3060 60%, #0d2040 100%);
  }
  .panel-image-placeholder.school-bg {
    background: linear-gradient(135deg, #1a1508 0%, #2a2010 30%, #3a2a10 60%, #201808 100%);
  }
  .panel-image-placeholder svg { width: 36px; height: 36px; opacity: 0.35; }
  .panel-image-placeholder .placeholder-country {
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.2); font-weight: 600;
  }
  .panel-image-placeholder::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.04) 0%, transparent 60%);
  }
  .panel-image-placeholder::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
    pointer-events: none;
  }

  /* Carousel */
  .carousel { position: relative; width: 100%; height: 100%; }
  .carousel-track { display: flex; height: 100%; transition: transform 0.3s ease; }
  .carousel-track .panel-slide { width: 100%; height: 100%; flex-shrink: 0; }
  .carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 2; }
  .panel-image:hover .carousel-arrow { opacity: 1; }
  .carousel-arrow.left { left: 6px; }
  .carousel-arrow.right { right: 6px; }
  .carousel-dots { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 2; }
  .carousel-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.4); border: none; cursor: pointer; padding: 0; }
  .carousel-dot.active { background: #f0c040; }

  .panel-desc { font-size: 15px; line-height: 1.6; color: #c8d0e8; margin-bottom: 16px; }

  .panel-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .panel-stat { background: rgba(255,255,255,0.04); border: 1px solid #2a3a60; border-radius: 10px; padding: 10px; text-align: center; }
  .panel-stat-value { font-size: 18px; font-weight: 700; color: var(--accent); }
  .panel-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; }

  /* ── Cluster popup ───────────────────────────── */
  #cluster-popup {
    position: fixed; z-index: 120;
    background: var(--panel-bg); border: 1px solid #3a5a90;
    border-radius: 18px; padding: 16px 10px;
    backdrop-filter: blur(20px); box-shadow: 0 12px 50px rgba(0,0,0,0.7);
    display: none; min-width: 280px;
    transform: translate(-50%, -100%); margin-top: -20px;
  }
  #cluster-popup.open { display: block; }
  #cluster-popup::after {
    content: ''; position: absolute; bottom: -8px; left: 50%;
    transform: translateX(-50%); width: 0; height: 0;
    border-left: 8px solid transparent; border-right: 8px solid transparent;
    border-top: 8px solid #2a3a60;
  }
  .cluster-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 12px;
    cursor: pointer; transition: background 0.2s; border: none;
    background: transparent; color: var(--text); font-size: 17px;
    width: 100%; text-align: left; font-family: inherit;
  }
  .cluster-item:hover { background: rgba(255,255,255,0.08); }
  .cluster-item-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .cluster-item-type { font-size: 12px; color: var(--text-muted); margin-left: auto; text-transform: uppercase; letter-spacing: 1.5px; }

  #overlay { position: fixed; inset: 0; z-index: 50; display: none; }
  #overlay.active { display: block; }

  /* ── Title Banner / Mission Control Ribbon ─────── */
  #title-banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
  }
  .banner-line-top { width: 100%; height: 1px; background: linear-gradient(to right, transparent 5%, rgba(240,192,64,0.15) 25%, rgba(0,229,255,0.3) 50%, rgba(240,192,64,0.15) 75%, transparent 95%); }
  .banner-status {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 6px 0; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(80,200,255,0.5);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #40e080; box-shadow: 0 0 8px #40e080; animation: status-blink 2s ease-in-out infinite; }
  @keyframes status-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-live { color: #40e080; font-weight: 700; letter-spacing: 4px; }
  .banner-main {
    width: 100%; display: flex; flex-direction: column; align-items: center;
    padding: 14px 40px 18px;
    background: linear-gradient(to bottom, rgba(3,5,14,0.97) 0%, rgba(5,8,18,0.7) 80%, transparent 100%);
  }
  .banner-title {
    font-size: 28px; font-weight: 700; letter-spacing: 5px;
    text-transform: uppercase; color: #f0c040; opacity: 0.95;
    text-shadow: 0 0 30px rgba(240,192,64,0.5), 0 0 60px rgba(240,192,64,0.2);
    margin-bottom: 12px;
  }
  .banner-stats-row {
    display: flex; align-items: center; justify-content: center; gap: 50px;
  }
  .banner-divider {
    width: 1px; height: 32px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
  }
  .banner-stat {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .stat-value {
    font-size: 34px; font-weight: 700; color: #f0c040;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 20px rgba(240,192,64,0.4), 0 0 40px rgba(240,192,64,0.15);
  }
  .stat-label {
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(240,210,140,0.55); font-weight: 500;
  }
  .ticker-strip {
    width: 100%; overflow: hidden; padding: 5px 0 8px;
    background: rgba(3,5,14,0.95);
    border-top: 1px solid rgba(80,200,255,0.06);
  }
  .ticker-scroll {
    display: flex; white-space: nowrap;
    animation: ticker-scroll 120s linear infinite;
    font-size: 12px; letter-spacing: 1px; color: rgba(144,168,208,0.5);
  }
  .ticker-scroll span { padding: 0 30px; }
  .ticker-scroll .ticker-dot { color: rgba(80,200,255,0.3); padding: 0 6px; }
  @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .banner-line-bottom { width: 100%; height: 1px; background: linear-gradient(to right, transparent 10%, rgba(80,200,255,0.08) 40%, rgba(80,200,255,0.08) 60%, transparent 90%); }

  /* ── Bottom Bar (LIVE + Ticker) ──────────────── */
  #bottom-bar {
    position: fixed; bottom: 40px; left: 0; right: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
    background: linear-gradient(to top, rgba(3,5,14,0.95) 0%, rgba(3,5,14,0.6) 70%, transparent 100%);
  }
  .bottom-bar-line { width: 100%; height: 1px; background: linear-gradient(to right, transparent 5%, rgba(0,229,255,0.2) 30%, rgba(0,229,255,0.3) 50%, rgba(0,229,255,0.2) 70%, transparent 95%); }

  /* ── Touch Prompt ────────────────────────────── */
  #touch-prompt {
    position: fixed; left: 50%; bottom: 50%;
    transform: translate(-50%, 50%); z-index: 8;
    display: flex; align-items: center; gap: 14px;
    padding: 18px 36px;
    background: rgba(2, 8, 20, 0.6);
    border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 30px; backdrop-filter: blur(10px);
    pointer-events: none; opacity: 0;
    transition: opacity 0.8s ease;
  }
  #touch-prompt.visible { opacity: 1; }
  #touch-prompt.hidden { opacity: 0; transition: opacity 0.5s ease; }
  #touch-prompt .prompt-icon {
    width: 36px; height: 36px; fill: var(--accent);
    animation: prompt-point 2s ease-in-out infinite;
  }
  #touch-prompt .prompt-text {
    font-size: 20px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0, 229, 255, 0.5), 0 0 40px rgba(0, 229, 255, 0.2);
    animation: prompt-breathe 3s ease-in-out infinite;
  }
  @keyframes prompt-breathe { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
  @keyframes prompt-point { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* ── Kiosk Mode Indicator ──────────────────────── */
  #kiosk-indicator {
    position: fixed; top: 20px; right: 20px; z-index: 9;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: rgba(2, 8, 20, 0.7);
    border: 1px solid rgba(0, 229, 255, 0.15);
    border-radius: 20px;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(0, 229, 255, 0.6);
    opacity: 0; transition: opacity 0.5s ease;
    pointer-events: none;
  }
  #kiosk-indicator.visible { opacity: 1; }
  #kiosk-indicator .kiosk-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: status-blink 2s ease-in-out infinite;
  }

  /* ── Prayer Journey Bar ──────────────────────── */
  #prayer-bar {
    position: fixed; bottom: 40px; left: 0; right: 0; z-index: 12;
    height: 160px;
    background: linear-gradient(to top, rgba(2, 8, 20, 0.95) 0%, rgba(2, 8, 20, 0.8) 60%, transparent 100%);
    display: flex; align-items: flex-end; padding: 0 60px 24px 90px;
    gap: 30px;
    opacity: 0; transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
  }
  #prayer-bar.visible { opacity: 1; transform: translateY(0); }
  #prayer-bar .prayer-photo {
    width: 120px; height: 120px; border-radius: 8px;
    border: 2px solid rgba(240, 192, 64, 0.5);
    box-shadow: 0 0 20px rgba(240, 192, 64, 0.2);
    overflow: hidden; flex-shrink: 0;
    background: rgba(10, 30, 60, 0.8);
    display: flex; align-items: center; justify-content: center;
  }
  #prayer-bar .prayer-photo img {
    width: 100%; height: 100%; object-fit: cover;
  }
  #prayer-bar .prayer-photo svg {
    width: 40px; height: 40px; opacity: 0.4;
  }
  #prayer-bar .prayer-info {
    flex: 1; min-width: 0;
  }
  #prayer-bar .prayer-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(0, 229, 255, 0.6); margin-bottom: 6px;
  }
  #prayer-bar .prayer-name {
    font-size: 28px; font-weight: 700; letter-spacing: 1px;
    color: #f0c040;
    text-shadow: 0 0 20px rgba(240, 192, 64, 0.4);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #prayer-bar .prayer-country {
    font-size: 14px; color: rgba(200, 220, 255, 0.6);
    margin-top: 4px; letter-spacing: 1px;
  }
  #prayer-bar .prayer-prompt {
    font-size: 16px; color: rgba(200, 220, 255, 0.85);
    margin-top: 8px; font-style: italic;
    line-height: 1.4;
    max-width: 700px;
  }
  #prayer-bar .prayer-progress {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(0, 229, 255, 0.1);
  }
  #prayer-bar .prayer-progress-fill {
    height: 100%; background: linear-gradient(90deg, #00e5ff, #f0c040);
    transition: width linear;
    width: 0;
  }

  /* ── Prayer Journey Spotlight ──────────────────── */
  #prayer-spotlight {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 5;
    opacity: 0; transition: opacity 1.5s ease;
  }
  #prayer-spotlight.visible { opacity: 1; }

  /* ── Journey Curtain (fade-through-dark for flicker-free zoom) ── */
  #journey-curtain {
    position: fixed; inset: 0; z-index: 4;
    background: rgba(2, 8, 20, 1);
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #journey-curtain.visible { opacity: 1; }


  /* ── Prayer Focus Ring (SVG overlay for active marker) ── */
  .prayer-focus-ring {
    fill: none;
    stroke: #f0c040;
    stroke-width: 2;
  }
  @keyframes focus-ring-pulse {
    0% { r: 30; opacity: 0.8; stroke-width: 3; }
    100% { r: 80; opacity: 0; stroke-width: 0.5; }
  }
  @keyframes focus-ring-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  #prayer-journey-btn {
    position: fixed; bottom: 100px; left: 30px; z-index: 13;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px;
    background: rgba(2, 12, 30, 0.75);
    border: 1px solid rgba(240, 192, 64, 0.35);
    border-radius: 30px;
    color: rgba(240, 192, 64, 0.85);
    font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: opacity 0.4s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    animation: journey-btn-glow 3s ease-in-out infinite;
  }
  @keyframes journey-btn-glow {
    0%, 100% { box-shadow: 0 0 8px rgba(240, 192, 64, 0.1), inset 0 0 8px rgba(240, 192, 64, 0.05); }
    50% { box-shadow: 0 0 20px rgba(240, 192, 64, 0.25), inset 0 0 12px rgba(240, 192, 64, 0.1); border-color: rgba(240, 192, 64, 0.55); }
  }
  #prayer-journey-btn:active {
    border-color: rgba(240, 192, 64, 0.7);

  }
  waveGroup.append('path').attr('class', 'ocean-wave').attr('d', d);

function findClusters(locs) {
  const positioned = locs.map(loc => {
    const pos = projection([loc.lng, loc.lat]);
    return { loc, pos };
  }).filter(p => p.pos);

  const used = new Set();
  const clusters = [];

  for (let i = 0; i < positioned.length; i++) {
    if (used.has(i)) continue;
    const cluster = [positioned[i]];
    used.add(i);
    for (let j = i + 1; j < positioned.length; j++) {
      if (used.has(j)) continue;
      const dx = positioned[i].pos[0] - positioned[j].pos[0];
      const dy = positioned[i].pos[1] - positioned[j].pos[1];
      if (Math.sqrt(dx*dx + dy*dy) < CLUSTER_RADIUS) {
        cluster.push(positioned[j]);
        used.add(j);
      }
    }
    clusters.push(cluster);
  }
  return clusters;
}

  const hqPos = projection([HQ.lng, HQ.lat]);

    const key = `${loc.lat.toFixed(1)},${loc.lng.toFixed(1)}`;
    if (arcTargets.has(key)) return;

    // Skip arcs that wrap around the map (longitude span > 180°)
    const lngSpan = Math.abs(HQ.lng - loc.lng);
    if (lngSpan > 180) return;
    // Interpolate as a series of points to avoid wild great-circle wrapping
    const steps = 50;
    const coords = [];
    for (let t = 0; t <= steps; t++) {
      const f = t / steps;
      const lng = HQ.lng + (loc.lng - HQ.lng) * f;
      const lat = HQ.lat + (loc.lat - HQ.lat) * f;
      // Skip points that project outside the clip extent
      const pt = projection([lng, lat]);
      if (!pt) continue;
      coords.push([lng, lat]);
    }
    if (coords.length < 2) return;
    const arcData = {
      type: 'Feature',

    };
    arcsGroup.append('path')
      .attr('class', 'arc-line')
      .attr('d', path(arcData))
      .style('opacity', 1);
  });

  // Collect unique projected positions for all locations
  const markerPositions = [];
  const posKeys = new Set();
  locations.forEach(loc => {
    const pos = projection([loc.lng, loc.lat]);
    if (!pos) return;
    const key = `${Math.round(pos[0])},${Math.round(pos[1])}`;
    if (posKeys.has(key)) return;
    posKeys.add(key);
    markerPositions.push(pos);
  });

  // ── Wandering light particles ─────────────────
  const lightsGroup = mapGroup.append('g').attr('class', 'lights');
  const hiddenGroup = mapGroup.append('g').style('visibility', 'hidden');
  const NUM_PARTICLES = 4;

  function makeCurvedPath(from, to) {
    const midX = (from[0] + to[0]) / 2;
    const midY = Math.min(from[1], to[1]) - Math.abs(from[0] - to[0]) * 0.15;
    const d = `M${from[0]},${from[1]} Q${midX},${midY} ${to[0]},${to[1]}`;
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    el.setAttribute('d', d);
    hiddenGroup.node().appendChild(el);
    return el;
  }

  // Pre-sample path points to avoid getPointAtLength every frame
  function samplePath(pathEl, numSamples) {
    const totalLen = pathEl.getTotalLength();
    const points = [];
    for (let i = 0; i <= numSamples; i++) {
      const pt = pathEl.getPointAtLength((i / numSamples) * totalLen);
      points.push({ x: pt.x, y: pt.y });
    }
    return { points, totalLen };
  }

  function interpolatePoints(points, t) {
    const idx = t * (points.length - 1);
    const lo = Math.floor(idx);
    const hi = Math.min(lo + 1, points.length - 1);
    const frac = idx - lo;
    return { x: points[lo].x + (points[hi].x - points[lo].x) * frac,
             y: points[lo].y + (points[hi].y - points[lo].y) * frac };
  }

  function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function launchParticle(delay, colorIdx) {
    const isBlue = colorIdx % 3 === 1;
    const mainGrad = isBlue ? 'url(#light-grad-blue)' : 'url(#light-grad)';
    const shadowGradId = isBlue ? 'url(#light-shadow-blue)' : 'url(#light-shadow-grad)';
    const shadow = lightsGroup.append('path')
      .attr('class', 'light-shadow')
      .attr('stroke', shadowGradId)
      .attr('opacity', 0);

      .attr('class', 'light-particle')
      .attr('stroke', mainGrad)

    function journey() {
      let nextPos;

      if (roll < 0.35) {
        nextPos = hqPos;
      } else if (roll < 0.55) {
        lastPos = hqPos;
        nextPos = pickRandom(markerPositions);
      } else {
        nextPos = pickRandom(markerPositions);

      if (Math.abs(lastPos[0] - nextPos[0]) < 2 && Math.abs(lastPos[1] - nextPos[1]) < 2) {
        nextPos = pickRandom(markerPositions);

      const pathEl = makeCurvedPath(lastPos, nextPos);

      const { points, totalLen } = samplePath(pathEl, 50);
      const trailFrac = 0.2;
      const dur = 4000 + Math.random() * 3000;

      const startTime = performance.now();
      function tick() {
        const elapsed = performance.now() - startTime;
        const t = Math.min(elapsed / dur, 1);
        const eased = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;

        const headT = eased;
        const tailT = Math.max(0, headT - trailFrac);

        const steps = 6;
        let d = '';
        for (let s = 0; s <= steps; s++) {
          const st = tailT + (headT - tailT) * (s / steps);
          const pt = interpolatePoints(points, st);

          particle.attr('opacity', 0);
          shadow.attr('opacity', 0);
          lastPos = nextPos;
          hiddenGroup.node().removeChild(pathEl);
          setTimeout(journey, 2000 + Math.random() * 3000);
        }
      }
      requestAnimationFrame(tick);

  // ══════════════════════════════════════════════════
  // Enhancement 1: Sonar Pulse Rings

  const pulseGroup = mapGroup.append('g').attr('class', 'pulse-rings');
  const clusterPositions = clusters.map(c => {
    const avgX = c.reduce((s, p) => s + p.pos[0], 0) / c.length;
    const avgY = c.reduce((s, p) => s + p.pos[1], 0) / c.length;

  });

  function spawnPulse() {
    const cp = clusterPositions[Math.floor(Math.random() * clusterPositions.length)];
    for (let i = 0; i < 2; i++) {
      const ring = pulseGroup.append('circle')

      const delay = i * 400;
      const start = performance.now() + delay;
      const dur = 2200;
      (function animate() {
        const t = Math.min((performance.now() - start) / dur, 1);
        if (t < 0) { requestAnimationFrame(animate); return; }
        const ease = 1 - Math.pow(1 - t, 2);
        ring.attr('r', ease * 120).attr('opacity', 0.5 * (1 - t)).attr('stroke-width', 2.5 - t * 2);
        if (t < 1) requestAnimationFrame(animate);
        else ring.remove();
      })();
    }
  }
  setTimeout(() => setInterval(spawnPulse, 6000 + Math.random() * 3000), 4000);

  // ══════════════════════════════════════════════════
  // Enhancement 2: Data Transmission Flash Along Arcs
  // ══════════════════════════════════════════════════
  const arcPathEls = [];
  const arcDestPositions = [];
  arcsGroup.selectAll('.arc-line').each(function(d, i) {
    arcPathEls.push(this);
    // Get the endpoint of this arc (destination position)
    const totalLen = this.getTotalLength();
    const endPt = this.getPointAtLength(totalLen);
    arcDestPositions.push({ x: endPt.x, y: endPt.y });
  });

  const flashGroup = mapGroup.append('g').attr('class', 'flash-arcs');

  // Pre-sample all arc paths once
  const arcSampled = arcPathEls.map(el => {
    const totalLen = el.getTotalLength();
    const pts = [];
    for (let i = 0; i <= 40; i++) {
      const pt = el.getPointAtLength((i / 40) * totalLen);
      pts.push({ x: pt.x, y: pt.y });
    }
    return { points: pts, totalLen };
  });

  function flashArc() {
    if (arcSampled.length === 0) return;
    const idx = Math.floor(Math.random() * arcSampled.length);
    const { points, totalLen } = arcSampled[idx];
    if (totalLen < 10) return;

    const trailFrac = 0.25;
    const dur = 1800;
    const flashPath = flashGroup.append('path')
      .attr('fill', 'none')
      .attr('stroke', 'rgba(0,229,255,0.9)')
      .attr('stroke-width', 3)
      .attr('filter', 'url(#flash-glow)')
      .attr('stroke-linecap', 'round');

    const startT = performance.now();
    (function tick() {
      const t = Math.min((performance.now() - startT) / dur, 1);
      const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
      const headT = ease;
      const tailT = Math.max(0, headT - trailFrac);
      let d = '';
      for (let s = 0; s <= 6; s++) {
        const st = tailT + (headT - tailT) * (s / 6);
        const pt = interpolatePoints(points, st);
        d += (s === 0 ? 'M' : 'L') + (pt.x|0) + ',' + (pt.y|0);
      }
      flashPath.attr('d', d);
      let op = 1;
      if (t < 0.05) op = t / 0.05;
      else if (t > 0.8) op = (1 - t) / 0.2;
      flashPath.attr('opacity', op);

      if (t < 1) requestAnimationFrame(tick);
      else {
        flashPath.remove();
        const nearestMarker = document.querySelector(`.marker-group:not(.hq-star)`);
        if (nearestMarker) {
          nearestMarker.classList.add('marker-flare');
          setTimeout(() => nearestMarker.classList.remove('marker-flare'), 600);
        }
      }
    })();
  }
  setTimeout(() => setInterval(flashArc, 10000 + Math.random() * 5000), 6000);

  // Signal that the map is fully rendered so the API fetch finally-block can update it
  window._mapReady = true;
  window._renderMarkers = function(locs) {
    buildTicker(locs);
  };
  // Signal map render complete → check if splash can be dismissed
  _splashMapDone = true;
  _checkSplashReady();

});

// HELPER: SVG coords → screen coords
// ════════════════════════════════════════════════════
function getSVGScreenPos(svgX, svgY) {
  const svgEl = document.querySelector('#map-container svg');
  const pt = svgEl.createSVGPoint();
  pt.x = svgX; pt.y = svgY;
  const ctm = document.querySelector('.markers').getCTM();
  const screenPt = pt.matrixTransform(ctm);
  const rect = svgEl.getBoundingClientRect();
  return { x: rect.left + screenPt.x, y: rect.top + screenPt.y };
}

// CLUSTER POPUP
// ════════════════════════════════════════════════════
const clusterPopup = document.getElementById('cluster-popup');

function openClusterPopup(cluster, svgX, svgY) {
  closePanel();
  const screenPos = getSVGScreenPos(svgX, svgY);

  clusterPopup.style.left = screenPos.x + 'px';
  clusterPopup.style.top = screenPos.y + 'px';

  let html = '';
  cluster.forEach(c => {
    const dotColor = c.loc.type === 'school' ? '#9b59b6' : '#f0c040';
    const typeLabel = c.loc.type === 'mission' ? 'Mission' : c.loc.type === 'hq' ? 'Headquarters' : 'School';
    html += `<button class="cluster-item" data-id="${c.loc.id}">
      <span class="cluster-item-dot" style="background:${dotColor};box-shadow:0 0 6px ${dotColor}"></span>
      <span>${c.loc.name}</span>
      <span class="cluster-item-type">${typeLabel}</span>
    </button>`;
  });
  clusterPopup.innerHTML = html;
  clusterPopup.classList.add('open');

  // Bind clicks — pass screen position so panel opens near dot
  clusterPopup.querySelectorAll('.cluster-item').forEach(btn => {
    function handle(e) {
      if (e) e.preventDefault();
      const loc = locations.find(l => l.id === btn.dataset.id);
      clusterPopup.classList.remove('open');
      if (loc) openPanel(loc, screenPos);
    }
    btn.addEventListener('click', handle);
    btn.addEventListener('touchend', handle);
  });
}

// Close cluster popup on outside click
document.addEventListener('click', (e) => {
  if (!clusterPopup.contains(e.target) && !e.target.closest('.marker-group')) {
    clusterPopup.classList.remove('open');
  }
});

function openPanel(loc, screenPos, forceRight) {
  // Always use latest data from API (cluster refs may be stale hardcoded data)
  loc = locations.find(l => l.id === loc.id) || loc;
  const typeLabel = loc.type === 'mission' ? 'Mission Project' : loc.type === 'hq' ? 'World Headquarters' : 'School / Seminary';
  const icon = loc.type === 'mission' ? '🌍' : loc.type === 'hq' ? '⭐' : '🎓';

  let statsHtml = '';
  if (loc.stats) {
    const entries = Object.entries(loc.stats);
    statsHtml = '<div class="panel-stats">' + entries.map(([key, val]) => `
      <div class="panel-stat">
        <div class="panel-stat-value">${val}</div>
        <div class="panel-stat-label">${key.replace(/_/g, ' ')}</div>
      </div>

    <div class="panel-type ${loc.type}">${typeLabel}</div>

      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      ${loc.country}
    </div>
    ${imageHtml}
    <div class="panel-desc">${loc.description}</div>
    ${statsHtml}
  `;

  // Position panel near the clicked dot
  if (screenPos) {
    const panelW = Math.min(400, 2400 * 0.75);
    const panelH = panel.scrollHeight || 400;
    const vw = 2400;
    const vh = 1350;

    let left, top;

    if (forceRight) {
      // During prayer journey: always place to the RIGHT of the centered dot
      left = screenPos.x + 180;
      top = screenPos.y - panelH / 2;
    } else {
      // Normal mode: prefer right, fall back to left
      left = screenPos.x + 30;
      if (left + panelW > vw - 20) left = screenPos.x - panelW - 30;
    }

    if (left + panelW > vw - 20) left = vw - panelW - 20;
    if (left < 10) left = 10;

    if (top === undefined) top = screenPos.y;
    if (top + panelH > vh - 10) top = vh - panelH - 10;
    if (top < 10) top = 10;

    panel.style.left = left + 'px';
    panel.style.top = top + 'px';
  }

  panel.classList.add('open');
  if (!forceRight) overlay.classList.add('active');
}

function closePanel() {
  panel.classList.remove('open');
  overlay.classList.remove('active');
  clusterPopup.classList.remove('open');
}

// ── Carousel navigation ─────────────────────────
function carouselNav(btn, dir) {
  const carousel = btn.closest('.carousel');
  const track = carousel.querySelector('.carousel-track');
  const count = parseInt(carousel.dataset.count);
  let current = parseInt(carousel.dataset.current || '0');
  current = (current + dir + count) % count;
  carousel.dataset.current = current;
  track.style.transform = `translateX(-${current * 100}%)`;
  carousel.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === current));
}
// Touch swipe for carousel
panel.addEventListener('touchstart', (e) => {
  const carousel = e.target.closest('.carousel');
  if (carousel) carousel._touchX = e.touches[0].clientX;
}, { passive: true });
panel.addEventListener('touchend', (e) => {
  const carousel = e.target.closest('.carousel');
  if (!carousel || !carousel._touchX) return;
  const dx = e.changedTouches[0].clientX - carousel._touchX;
  if (Math.abs(dx) > 40) {
    const arrow = carousel.querySelector(dx < 0 ? '.carousel-arrow.right' : '.carousel-arrow.left');
    if (arrow) arrow.click();
  }
  carousel._touchX = null;
});
// Dot click
panel.addEventListener('click', (e) => {
  if (e.target.classList.contains('carousel-dot')) {
    const carousel = e.target.closest('.carousel');
    const idx = parseInt(e.target.dataset.slide);
    carousel.dataset.current = idx;
    carousel.querySelector('.carousel-track').style.transform = `translateX(-${idx * 100}%)`;
    carousel.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  }
});

// ── Handle resize ────────────────────────────────
window.addEventListener('resize', () => {
  svg.attr('viewBox', `0 0 2400 1350`);
});

// ── Animated stat counters ──────────────────────
document.querySelectorAll('#title-banner .stat-value').forEach(el => {
  const target = +el.dataset.target;
  const suffix = el.dataset.suffix || '';
  const hasDecimal = String(el.dataset.target).includes('.');
  const dur = 2000;
  setTimeout(() => {
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / dur, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = eased * target;
      el.textContent = (hasDecimal ? val.toFixed(1) : Math.round(val)) + suffix;
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }, 1500);
});

function buildTicker(locs) {

// Enhancement 8: Touch Ripple Effect
// ════════════════════════════════════════════════════
setTimeout(function initTouchRipple() {
  const svgEl = document.querySelector('#map-container svg');
  if (!svgEl) return;
  const rippleGroup = d3.select(svgEl).append('g').attr('class', 'touch-ripple-layer');

  function spawnRipple(svgX, svgY, color) {
    for (let i = 0; i < 3; i++) {
      const ring = rippleGroup.append('circle')
        .attr('class', 'touch-ripple')
        .attr('cx', svgX).attr('cy', svgY)
        .attr('r', 0).attr('stroke', color || 'rgba(80,200,255,0.4)')
        .attr('stroke-width', 2.5).attr('opacity', 0.5);
      const delay = i * 150;
      const start = performance.now() + delay;
      const dur = 1200;
      (function animate() {
        const t = Math.min((performance.now() - start) / dur, 1);
        if (t < 0) { requestAnimationFrame(animate); return; }
        const ease = 1 - Math.pow(1 - t, 3);
        ring.attr('r', ease * 150).attr('opacity', 0.5 * (1 - t)).attr('stroke-width', 2.5 - t * 2);
        if (t < 1) requestAnimationFrame(animate);
        else ring.remove();
      })();
    }
  }

  function getSVGCoords(e) {
    const pt = svgEl.createSVGPoint();
    const touch = e.changedTouches ? e.changedTouches[0] : e;
    pt.x = touch.clientX; pt.y = touch.clientY;
    return pt.matrixTransform(svgEl.getScreenCTM().inverse());
  }

  svgEl.addEventListener('click', (e) => {
    if (e.target.closest('#info-panel') || e.target.closest('#cluster-popup')) return;
    const coords = getSVGCoords(e);
    const isMarker = e.target.closest('.marker-group');
    const color = isMarker ? 'rgba(240,192,64,0.5)' : 'rgba(80,200,255,0.3)';
    spawnRipple(coords.x, coords.y, color);
  });
}, 3000);

// FEATURE: Multi-Touch Prayer Chain
// ════════════════════════════════════════════════════
(function initTouchChain() {
  const chainSvg = document.getElementById('touch-chain-svg');
  const chainLabel = document.getElementById('touch-chain-label');
  const activeTouches = new Map(); // touchId -> {x, y}
  let chainVisible = false;

  function findNearestLocation(screenX, screenY) {
    // Convert screen coords back to SVG coords to find nearest marker
    let bestDist = Infinity, bestLoc = null;
    locations.forEach(loc => {
      const pos = projection([loc.lng, loc.lat]);
      if (!pos) return;
      const sp = getSVGScreenPos(pos[0], pos[1]);
      const d = Math.hypot(sp.x - screenX, sp.y - screenY);
      if (d < bestDist) { bestDist = d; bestLoc = { loc, screen: sp }; }
    });
    return bestLoc;
  }

  function updateChain() {
    const points = Array.from(activeTouches.values());

    if (points.length < 2) {
      chainSvg.innerHTML = '';
      if (chainVisible) {
        chainLabel.classList.remove('visible');
        chainVisible = false;
      }
      return;
    }

    if (!chainVisible) {
      chainLabel.classList.add('visible');
      chainVisible = true;
    }

    // Build SVG arcs between all pairs
    let html = '';
    const ns = 'http://www.w3.org/2000/svg';

    for (let i = 0; i < points.length; i++) {
      for (let j = i + 1; j < points.length; j++) {
        const a = points[i], b = points[j];
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const curve = dist * 0.3;
        // Curved arc path
        const ctrl = { x: mx, y: my - curve };
        html += `<path d="M${a.x},${a.y} Q${ctrl.x},${ctrl.y} ${b.x},${b.y}"
          fill="none" stroke="url(#chain-grad)" stroke-width="2.5"
          style="animation: chain-pulse 2s ease-in-out infinite; animation-delay: ${i * 0.3}s;
                 filter: drop-shadow(0 0 8px rgba(240, 192, 64, 0.5));" />`;
      }
    }

    // Glow dots at each touch point
    points.forEach(p => {
      html += `<circle cx="${p.x}" cy="${p.y}" r="12"
        fill="none" stroke="#f0c040" stroke-width="2" opacity="0.6">
        <animate attributeName="r" values="12;24;12" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>`;
      html += `<circle cx="${p.x}" cy="${p.y}" r="5" fill="#f0c040" opacity="0.8"/>`;
    });

    // Gradient definition
    html = `<defs><linearGradient id="chain-grad">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffe080" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f0c040" stop-opacity="0.8"/>
    </linearGradient></defs>` + html;

    chainSvg.innerHTML = html;

    // Collective pulse — briefly brighten all markers
    d3.selectAll('.marker-halo').each(function() {
      d3.select(this).transition().duration(300)
        .attr('r', function() { return parseFloat(d3.select(this).attr('r')) + 3; })
        .transition().duration(600)
        .attr('r', function() { return parseFloat(d3.select(this).attr('r')) - 3; });
    });
  }

  document.addEventListener('touchstart', (e) => {
    for (const touch of e.changedTouches) {
      const nearest = findNearestLocation(touch.clientX, touch.clientY);
      if (nearest) {
        activeTouches.set(touch.identifier, { x: nearest.screen.x, y: nearest.screen.y, loc: nearest.loc });
      }
    }
    updateChain();
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    for (const touch of e.changedTouches) {
      if (activeTouches.has(touch.identifier)) {
        const nearest = findNearestLocation(touch.clientX, touch.clientY);
        if (nearest) {
          activeTouches.set(touch.identifier, { x: nearest.screen.x, y: nearest.screen.y, loc: nearest.loc });
        }
      }
    }
    updateChain();
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    for (const touch of e.changedTouches) {
      activeTouches.delete(touch.identifier);
    }
    updateChain();
  }, { passive: true });

  document.addEventListener('touchcancel', (e) => {
    for (const touch of e.changedTouches) {
      activeTouches.delete(touch.identifier);
    }
    updateChain();
  }, { passive: true });
})();
</script>
</div>
<script>
(function fitScene() {
  const scene = document.getElementById("scene");
  function resize() {
    const sx = window.innerWidth / 2400;
    const sy = window.innerHeight / 1350;
    const s = Math.min(sx, sy);
    scene.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  resize();
  window.addEventListener("resize", resize);
})();

</script>

<!-- Server heartbeat: reconnect overlay during updates/outages -->
<div id="reconnect-overlay" style="display:none; position:fixed; inset:0; z-index:99999;
  background:rgba(0,0,0,0.85); align-items:center; justify-content:center; flex-direction:column;">
  <div style="color:#f0c040; font-size:28px; font-family:'Segoe UI',system-ui,sans-serif; text-align:center;">
    <div style="margin-bottom:16px; font-size:40px;">&#x21bb;</div>
    Reconnecting to server&hellip;
    <div style="margin-top:12px; font-size:16px; color:#8090a0;">The display will resume automatically.</div>
  </div>
</div>
<script>
(function serverHeartbeat() {
  var overlay = document.getElementById("reconnect-overlay");
  var failures = 0;
  var wasDown = false;
  var everConnected = false;

  function check() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/api/health", true);
    xhr.timeout = 5000;
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        everConnected = true;
        failures = 0;
        if (wasDown) {
          wasDown = false;
          overlay.style.display = "none";
          window.location.reload();
        }
      } else {
        onFail();
      }
    };
    xhr.onerror = onFail;
    xhr.ontimeout = onFail;
    xhr.send();
  }

  function onFail() {
    // If we've never had a successful connection, this isn't a local kiosk
    // server — don't show the reconnect overlay (e.g. when hosted on Vercel).
    if (!everConnected) return;
    failures++;
    if (failures >= 2 && !wasDown) {
      wasDown = true;
      overlay.style.display = "flex";
    }
  }

  setInterval(check, 30000);
  check();
})();
</script>
</body>
